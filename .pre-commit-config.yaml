repos:
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        name: "🔒 gitleaks · Detect hardcoded secrets"
repos:
-   repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
    - id: black
      name: "🐍 black · Format code"
      args: [
              "--config",
              "./pyproject.toml",
            ]
-   repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
    - id: isort
      name: "🐍 isort · Sort imports"
      args:
        [
          "--settings-path",
          "./pyproject.toml",
        ]
- repo: local
  hooks:
    - id: pylint
      name: "🐍 pylint · Lint frontend"
      entry: pylint
      language: system
      types: [python]
      args:
        [
          "--errors-only",       # match CI: pylint --errors-only frontend
          "-rn",                 # only display messages
          "-sn",                 # don't display the score
          "--rcfile=.pylintrc",  # link to the repo config
        ]
      files: ^frontend/
