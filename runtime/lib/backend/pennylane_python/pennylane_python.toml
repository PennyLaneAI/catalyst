CNOT = { properties = ["invertible", "controllable"] }
CY = { properties = ["invertible", "controllable"] }
CZ = { properties = ["invertible", "controllable"] }
SWAP = { properties = ["invertible", "controllable"] }
CSWAP = { properties = ["invertible", "controllable"] }
Toffoli = { properties = ["invertible", "controllable"] }
ISWAP = { properties = ["invertible", "controllable"] }
