[measurement_processes]

ExpectationMP = { }
VarianceMP = { }
ProbabilityMP = { }
StateMP = { conditions = ["analytic"] }
SampleMP = { conditions = ["finiteshots"] }
CountsMP = { conditions = ["finiteshots"] }

[compilation]

# Compatible with qjit
qjit_compatible = true
# Requires runtime code generation (tape is built at execution time)
runtime_code_generation = true
# Static qubit allocation only
dynamic_qubit_management = false
# MCM support depends on the underlying Python device; conservatively disabled
supported_mcm_methods = [ ]
