schema = 3

# The PennyLane Python compatibility backend.
#
# This device configuration declares the maximal gate set that the Catalyst
# runtime C API can express. At compile time, the Catalyst frontend intersects
# this with the target Python device's actual capabilities (from its own TOML)
# to determine the effective gate set. Any operations outside that intersection
# are decomposed before lowering to LLVM IR.
#
# At runtime, the compiled binary calls into this C++ device backend, which
# accumulates operations and delegates measurement execution to the Python
# device via nanobind callback.

[operators.gates]

Identity = { properties = ["invertible", "controllable"] }
PauliX = { properties = ["invertible", "controllable"] }
PauliY = { properties = ["invertible", "controllable"] }
PauliZ = { properties = ["invertible", "controllable"] }
Hadamard = { properties = ["invertible", "controllable"] }
